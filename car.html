<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Car Details | Speed Star Motors</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.slider{
position:relative;
max-width:700px;
margin:auto;
}

.slide{
display:none;
}

.slide img{
width:100%;
border-radius:10px;
}

.active{
display:block;
}

.controls{
text-align:center;
margin-top:15px;
}

button{
padding:10px 15px;
border:none;
background:red;
color:white;
cursor:pointer;
border-radius:5px;
}

.details{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.price{
color:red;
font-size:28px;
font-weight:bold;
}

.specs{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.spec{
background:#eee;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>Speed Star Motors</h1>
<p>Car Details</p>

</header>

<div class="container">

<div class="slider">

<div class="slide active">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1493238792000-8113da705763">
</div>

</div>

<div class="controls">

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>

</div>

<div class="details">

<h2>BMW M4 Competition</h2>

<p class="price">€72,000</p>

<p>
Luxury sports coupe available at Speed Star Motors showroom in Paris.
Low mileage and premium interior.
</p>

<div class="specs">

<div class="spec">Year: 2022</div>
<div class="spec">Mileage: 18,000 km</div>
<div class="spec">Engine: 3.0L Twin Turbo</div>
<div class="spec">Transmission: Automatic</div>
<div class="spec">Fuel: Petrol</div>
<div class="spec">Drive: AWD</div>

</div>

<br>

<button>Book Test Drive</button>

</div>

</div>

<script>

let index=0;

let slides=document.getElementsByClassName("slide");

function showSlide(i){

for(let s of slides){
s.style.display="none";
}

slides[i].style.display="block";

}

showSlide(index);

function next(){

index++;

if(index>=slides.length){
index=0;
}

showSlide(index);

}

function prev(){

index--;

if(index<0){
index=slides.length-1;
}

showSlide(index);

}

</script>

</body>
</html>
