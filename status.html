<!DOCTYPE html>
<html>
<head>
<title>Check Application Status</title>
<style>
body{font-family:Arial;text-align:center;background:#f0f0f0;}
.box{background:white;padding:20px;margin:50px auto;width:400px;}
</style>
</head>
<body>

<div class="box">
<h2>Check Status</h2>
<input id="email" placeholder="Email"><br><br>
<input id="dob" type="date"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<button onclick="checkStatus()">Check</button>
<h3 id="result"></h3>
</div>

<script>
function checkStatus(){
let email=document.getElementById("email").value;
let dob=document.getElementById("dob").value;
let phone=document.getElementById("phone").value;
let key=email+dob+phone;
let status=localStorage.getItem(key);
document.getElementById("result").innerText=status ? "Status: "+status : "No record found";
}
</script>

</body>
</html>
